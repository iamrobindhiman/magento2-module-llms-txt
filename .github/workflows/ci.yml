name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: Magento 2 Coding Standard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Allow required Composer plugins globally
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global config --no-plugins allow-plugins.magento/composer-dependency-version-audit-plugin true
          composer global config --no-plugins allow-plugins.magento/composer-root-update-plugin true
          composer global config --no-plugins allow-plugins.magento/inventory-composer-installer true

      - name: Install Magento Coding Standard
        run: composer global require --dev magento/magento-coding-standard

      - name: Resolve composer global bin dir
        id: composer-bin
        run: echo "path=$(composer global config bin-dir --absolute --quiet)" >> "$GITHUB_OUTPUT"

      - name: Run PHPCS against Magento2 standard
        # --error-severity=1 : fail on any error
        # --warning-severity=8 : show high-severity warnings only (info-level)
        # --runtime-set ignore_warnings_on_exit 1 : don't fail build on warnings-only
        # Warnings are surfaced for review but don't block the build.
        run: |
          ${{ steps.composer-bin.outputs.path }}/phpcs \
            --standard=Magento2 \
            --extensions=php \
            --error-severity=1 \
            --warning-severity=8 \
            --runtime-set ignore_warnings_on_exit 1 \
            -p .

  syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: PHP Lint all files
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 -P4 php -l
